settings:
    state_dir: ~/.ainn
    log_dir: ~/.ainn/logs
    launch:
        default_mode: hosted-terminal
    terminal:
        host: tmux
        opener: default
        tmux:
            socket_name: ainn
            host_session: ainn-host
            host_start_mode: new-window
    metrics:
        retention_days: 30
plugins:
    api_translate:
        kind: request_middleware
        source: builtin
    tool_filter:
        kind: request_middleware
        source: external
        path: plugins/request/tool_filter/plugin.yaml
    model_override:
        kind: request_middleware
        source: external
        path: plugins/request/model_override/plugin.yaml
    request_log:
        kind: request_middleware
        source: external
        path: plugins/request/request_log/plugin.yaml
    debug_sse:
        kind: request_middleware
        source: builtin
    config_patch:
        kind: lifecycle_hook
        source: builtin
workers:
    codex-app:
        port: 6767
        upstream: joycode
        upstream_pool: codex-ha
        launcher: codex
        # Optional outbound HTTP proxy for this worker.
        # proxy_url: http://127.0.0.1:7890
        log_level: simple
        request_modules:
            api_translate:
                enabled: true
            tool_filter:
                enabled: true
                blocked_tools:
                    - image_generation
            model_override:
                enabled: false
                model: gpt-4o
            request_log:
                enabled: true
        hooks:
            config_patch:
                enabled: true
                config_path: ~/.codex/config.toml
upstreams:
    joycode:
        base_url: https://api.joycode.dev/v1
        api_key: sk-...
        api_format: chat_completions
    anthropic:
        base_url: https://api.anthropic.com/v1
        api_key: sk-...
        api_format: anthropic
    openrouter:
        base_url: https://openrouter.ai/api/v1
        api_key: sk-...
        api_format: chat_completions
        stream_timeouts:
            first_byte_seconds: 60
            idle_seconds: 120
        protocol_probe:
            model: openai/gpt-5-mini

# Reusable priority-ordered fallback routes. The active member is applied to
# every worker using the pool when its current upstream circuit opens.
upstream_pools:
    codex-ha:
        mode: active
        probe:
            stable_interval_seconds: 900
            alert_interval_seconds: 60
        upstreams:
            - joycode
            - openrouter
        circuit_breaker:
            failure_threshold: 3
            recovery_success_threshold: 2
            recovery_wait_seconds: 60
