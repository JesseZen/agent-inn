settings:
    state_dir: ~/.ainn
    log_dir: ~/.ainn/logs
    launch:
        default_mode: hosted-terminal
    terminal:
        host: tmux
        opener: default
        tmux:
            socket_name: ainn
            host_session: ainn-host
            host_start_mode: new-window
    metrics:
        retention_days: 30
plugins:
    api_translate:
        kind: request_middleware
        source: builtin
    tool_filter:
        kind: request_middleware
        source: external
        path: plugins/request/tool_filter/plugin.yaml
    model_override:
        kind: request_middleware
        source: external
        path: plugins/request/model_override/plugin.yaml
    request_log:
        kind: request_middleware
        source: external
        path: plugins/request/request_log/plugin.yaml
    debug_sse:
        kind: request_middleware
        source: builtin
    config_patch:
        kind: lifecycle_hook
        source: builtin
workers:
    codex-app:
        port: 6767
        upstream: joycode
        launcher: codex
        # Optional outbound HTTP proxy for this worker.
        # proxy_url: http://127.0.0.1:7890
        log_level: simple
        request_modules:
            api_translate:
                enabled: true
            tool_filter:
                enabled: true
                blocked_tools:
                    - image_generation
            model_override:
                enabled: false
                model: gpt-4o
            request_log:
                enabled: true
        hooks:
            config_patch:
                enabled: true
                config_path: ~/.codex/config.toml
upstreams:
    joycode:
        base_url: https://api.joycode.dev/v1
        api_key: sk-...
        api_format: chat_completions
    anthropic:
        base_url: https://api.anthropic.com/v1
        api_key: sk-...
        api_format: anthropic
